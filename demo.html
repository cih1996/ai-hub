<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Hub</title>
    <!-- Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Marked.js for Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#7c6aef', // Reference --accent
                        secondary: '#6b5ce7', // Reference --accent-hover
                        dark: {
                            bg: '#0a0a0a',      // Reference --bg-primary
                            card: '#141414',    // Reference --bg-secondary
                            sidebar: '#1e1e1e', // Reference --bg-tertiary
                            hover: '#262626',   // Reference --bg-hover
                            active: '#303030',  // Reference --bg-active
                            border: '#262626',  // Reference --border
                            text: '#ececec',    // Reference --text-primary
                            muted: '#a0a0a0'    // Reference --text-secondary
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom Scrollbar matching reference */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        
        /* Mobile Safe Area Utilities */
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }
        .pt-safe {
            padding-top: env(safe-area-inset-top);
        }

        /* Dynamic Viewport Height for Mobile */
        .h-dvh {
            height: 100vh; /* Fallback */
            height: 100dvh;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #333;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #5a5a5a;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', system-ui, sans-serif;
            /* Prevent pull-to-refresh on mobile */
            overscroll-behavior-y: none;
        }

        /* Markdown Styles */
        .markdown-body p { margin-bottom: 0.75em; }
        .markdown-body pre { background: rgba(0,0,0,0.1); padding: 10px; border-radius: 6px; overflow-x: auto; }
        .dark .markdown-body pre { background: rgba(255,255,255,0.05); border: 1px solid #333; }
        .markdown-body code { font-family: monospace; background: rgba(0,0,0,0.05); padding: 2px 4px; border-radius: 4px; }
        .dark .markdown-body code { background: rgba(255,255,255,0.1); }
        .markdown-body ul { list-style-type: disc; margin-left: 1.5em; margin-bottom: 0.75em; }
        .markdown-body ol { list-style-type: decimal; margin-left: 1.5em; margin-bottom: 0.75em; }
        
        .fade-enter-active, .fade-leave-active { transition: opacity 0.2s ease; }
        .fade-enter-from, .fade-leave-to { opacity: 0; }

        /* Tab Transition */
        .tab-enter-active, .tab-leave-active { transition: all 0.2s ease; }
        .tab-enter-from, .tab-leave-to { opacity: 0; transform: translateY(2px); }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 dark:bg-dark-bg dark:text-dark-text transition-colors duration-300 h-dvh overflow-hidden text-sm">
    <div id="app" class="h-full flex flex-col">
        
        <!-- Top Navigation Bar (Desktop & Mobile Optimized) -->
        <header v-show="!isMobileChat" class="bg-white dark:bg-dark-card border-b border-gray-200 dark:border-dark-border flex flex-col shrink-0 z-20 transition-all duration-300">
            
            <!-- Top Row: Logo & Actions -->
            <div class="h-12 flex items-center justify-between px-4">
                <!-- Logo -->
                <div class="flex items-center gap-3">
                    <div class="w-7 h-7 rounded bg-primary flex items-center justify-center text-white font-bold shadow-md">
                        <i class="fa-solid fa-hub"></i>
                    </div>
                    <h1 class="text-lg font-bold tracking-tight text-gray-800 dark:text-white">
                        AI Hub
                    </h1>
                </div>

                <!-- Right Actions -->
                <div class="flex items-center gap-3">
                    <!-- Switch to Classic Version -->
                    <a href="/" class="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-medium bg-gray-100 dark:bg-dark-hover text-gray-600 dark:text-dark-muted hover:bg-gray-200 dark:hover:bg-dark-active transition-colors border border-gray-200 dark:border-dark-border">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                            <polyline points="9 22 9 12 15 12 15 22"/>
                        </svg>
                        传统版
                    </a>
                    <button @click="toggleTheme" class="w-8 h-8 rounded-full flex items-center justify-center hover:bg-gray-100 dark:hover:bg-dark-hover transition-colors text-gray-500 dark:text-dark-muted">
                        <i v-if="isDark" class="fa-solid fa-sun"></i>
                        <i v-else class="fa-solid fa-moon"></i>
                    </button>
                    <div class="w-7 h-7 rounded-full bg-gray-200 dark:bg-dark-hover overflow-hidden border border-gray-300 dark:border-dark-border">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Admin" alt="User" class="w-full h-full object-cover">
                    </div>
                </div>
            </div>

            <!-- Bottom Row: Tabs (Scrollable) -->
            <div class="h-10 flex items-center gap-2 px-2 overflow-x-auto no-scrollbar mask-gradient border-t border-gray-100 dark:border-dark-border/50 bg-gray-50/50 dark:bg-dark-bg/50">
                <div v-for="tab in tabs" :key="tab.id" 
                     @click="activeTabId = tab.id"
                     class="group relative flex items-center gap-2 px-3 py-1.5 rounded-full cursor-pointer transition-all border shrink-0"
                     :class="activeTabId === tab.id 
                        ? 'bg-white dark:bg-dark-card border-gray-200 dark:border-dark-border text-primary font-medium shadow-sm' 
                        : 'border-transparent text-gray-500 dark:text-dark-muted hover:bg-gray-200/50 dark:hover:bg-dark-hover'">
                    
                    <i :class="getTabIcon(tab.type)" class="text-xs"></i>
                    <span class="truncate text-xs max-w-[100px]">{{ tab.title }}</span>
                    
                    <!-- Close Button -->
                    <button v-if="tab.type !== 'dashboard'" 
                            @click.stop="closeTab(tab.id)"
                            class="w-4 h-4 rounded-full hover:bg-gray-200 dark:hover:bg-gray-600 flex items-center justify-center transition-opacity text-gray-400 hover:text-red-500">
                        <i class="fa-solid fa-times text-[10px]"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="flex-1 overflow-hidden relative bg-gray-50 dark:bg-dark-bg">
            
            <!-- Loading State -->
            <div v-if="loading" class="absolute inset-0 flex items-center justify-center bg-white/80 dark:bg-dark-bg/80 z-50 backdrop-blur-sm">
                <div class="flex flex-col items-center gap-3">
                    <div class="w-8 h-8 border-2 border-primary border-t-transparent rounded-full animate-spin"></div>
                    <span class="text-xs font-medium text-gray-500 dark:text-gray-400">正在同步数据...</span>
                </div>
            </div>

            <div v-for="tab in tabs" :key="tab.id" v-show="activeTabId === tab.id" class="h-full w-full">
                
                <!-- Dashboard View -->
                <div v-if="tab.type === 'dashboard'" class="h-full overflow-y-auto p-4 md:p-6">
                    <div class="max-w-7xl mx-auto">
                        <div class="mb-4 md:mb-6">
                            <h2 class="text-xl md:text-2xl font-bold mb-1 text-gray-800 dark:text-white">团队列表</h2>
                            <p class="text-gray-500 dark:text-dark-muted text-xs md:text-sm">选择一个团队进行管理和对话</p>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                            <div v-for="(members, teamName) in groupedTeams" :key="teamName" 
                                 @click="openTeamTab(teamName)"
                                 class="group relative bg-white dark:bg-dark-card rounded-xl p-4 md:p-5 border border-gray-200 dark:border-dark-border shadow-sm hover:shadow-lg hover:border-primary/50 dark:hover:border-primary/50 transition-all duration-200 cursor-pointer overflow-hidden active:scale-95 md:active:scale-100">
                                
                                <div class="flex justify-between items-start mb-3">
                                    <div class="w-10 h-10 rounded-lg bg-gray-100 dark:bg-dark-hover flex items-center justify-center text-lg text-primary group-hover:bg-primary group-hover:text-white transition-colors duration-200">
                                        <i class="fa-solid fa-users"></i>
                                    </div>
                                    <span class="bg-gray-100 dark:bg-dark-hover text-gray-600 dark:text-dark-muted text-xs font-medium px-2 py-1 rounded-full border border-gray-200 dark:border-dark-border">
                                        {{ members.length }} 成员
                                    </span>
                                </div>
                                
                                <h3 class="text-lg font-bold mb-1 text-gray-800 dark:text-white group-hover:text-primary transition-colors truncate">{{ teamName }}</h3>
                                <p class="text-xs text-gray-500 dark:text-dark-muted line-clamp-2 h-8 mb-4">
                                    包含 {{ members.map(m => m.title).join(', ') }}
                                </p>
                                
                                <!-- Avatars Preview -->
                                <div class="flex items-center -space-x-2">
                                    <div v-for="(member, idx) in members.slice(0, 4)" :key="member.id" 
                                         class="w-6 h-6 rounded-full border border-white dark:border-dark-card bg-gray-200 dark:bg-dark-hover overflow-hidden"
                                         :style="{ zIndex: 5-idx }">
                                        <img :src="getAvatar(member)" class="w-full h-full object-cover">
                                    </div>
                                    <div v-if="members.length > 4" class="w-6 h-6 rounded-full border border-white dark:border-dark-card bg-gray-100 dark:bg-dark-hover flex items-center justify-center text-[10px] font-bold text-gray-500 dark:text-dark-muted z-0">
                                        +{{ members.length - 4 }}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Team Detail View -->
                <div v-else-if="tab.type === 'team'" class="h-full flex flex-col md:flex-row relative">
                    
                    <!-- Left Sidebar: Team Members -->
                    <!-- Mobile: Hide if session is selected -->
                    <!-- Desktop: Always show -->
                    <div class="w-full md:w-64 border-r border-gray-200 dark:border-dark-border bg-white dark:bg-dark-sidebar flex flex-col shrink-0 h-full absolute md:relative z-10 transition-transform duration-300"
                         :class="{
                             'hidden md:flex': isMobile && tab.data.currentSession,
                             'flex': !isMobile || !tab.data.currentSession
                         }">
                        <div class="p-3 border-b border-gray-200 dark:border-dark-border">
                            <h3 class="font-bold text-gray-700 dark:text-gray-200 flex items-center gap-2 truncate text-sm">
                                <i class="fa-solid fa-users-viewfinder text-primary"></i>
                                {{ tab.data.teamName }}
                            </h3>
                        </div>
                        
                        <div class="flex-1 overflow-y-auto p-2 space-y-1">
                            <div v-for="session in groupedTeams[tab.data.teamName]" :key="session.id" 
                                 @click="selectSessionInTab(tab, session)"
                                 class="p-3 md:p-2 rounded-lg cursor-pointer transition-all duration-200 border border-transparent group"
                                 :class="tab.data.currentSession?.id === session.id ? 'bg-primary/10 border-primary/20' : 'hover:bg-gray-100 dark:hover:bg-dark-hover bg-gray-50/50 dark:bg-transparent'">
                                <div class="flex items-center gap-3 md:gap-2">
                                    <div class="relative shrink-0">
                                        <div class="w-10 h-10 md:w-8 md:h-8 rounded-md bg-gray-200 dark:bg-dark-hover overflow-hidden">
                                            <img :src="getAvatar(session)" class="w-full h-full object-cover">
                                        </div>
                                        <div v-if="session.process_alive" class="absolute -bottom-0.5 -right-0.5 w-3 h-3 md:w-2.5 md:h-2.5 bg-green-500 border-2 border-white dark:border-dark-sidebar rounded-full"></div>
                                    </div>
                                    <div class="flex-1 min-w-0">
                                        <div class="flex justify-between items-center mb-0.5 md:mb-0">
                                            <h4 class="font-medium text-sm md:text-xs truncate" :class="tab.data.currentSession?.id === session.id ? 'text-primary' : 'text-gray-800 dark:text-gray-200'">{{ session.title }}</h4>
                                        </div>
                                        <p class="text-xs md:text-[10px] text-gray-500 dark:text-dark-muted truncate">
                                            {{ session.process_alive ? '在线' : '离线' }}
                                        </p>
                                    </div>
                                    <i class="fa-solid fa-chevron-right text-gray-300 dark:text-gray-600 text-xs md:hidden"></i>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Right Panel: Chat Interface -->
                    <!-- Mobile: Show if session is selected -->
                    <!-- Desktop: Always show (maybe empty state) -->
                    <div class="flex-1 flex flex-col bg-gray-50 dark:bg-dark-bg h-full min-w-0 absolute md:relative w-full z-20 md:z-auto"
                         :class="{
                             'flex': !isMobile || tab.data.currentSession,
                             'hidden md:flex': isMobile && !tab.data.currentSession
                         }">
                        
                        <template v-if="tab.data.currentSession">
                            <!-- Chat Header -->
                            <div class="h-12 border-b border-gray-200 dark:border-dark-border bg-white dark:bg-dark-card flex items-center justify-between px-3 md:px-4 shrink-0">
                                <div class="flex items-center gap-2 md:gap-3 overflow-hidden">
                                    <!-- Mobile Back Button -->
                                    <button @click="tab.data.currentSession = null" class="md:hidden w-8 h-8 -ml-1 flex items-center justify-center rounded-full active:bg-gray-100 dark:active:bg-dark-hover text-gray-500 dark:text-dark-muted">
                                        <i class="fa-solid fa-arrow-left"></i>
                                    </button>
                                    
                                    <span class="text-sm font-bold text-gray-800 dark:text-white flex items-center gap-2 truncate">
                                        {{ tab.data.currentSession.title }}
                                        <span v-if="tab.data.currentSession.has_triggers" class="px-1.5 py-0.5 rounded text-[10px] bg-orange-100 dark:bg-orange-900/30 text-orange-600 dark:text-orange-400 shrink-0">触发器</span>
                                    </span>
                                </div>
                                <div class="flex items-center gap-2 text-gray-400 shrink-0">
                                    <button class="w-7 h-7 rounded hover:bg-gray-100 dark:hover:bg-dark-hover flex items-center justify-center transition-colors">
                                        <i class="fa-solid fa-ellipsis"></i>
                                    </button>
                                </div>
                            </div>

                            <!-- Messages Area -->
                            <div :id="'messages-container-' + tab.id" class="flex-1 overflow-y-auto p-3 md:p-4 space-y-4">
                                <div v-if="tab.data.loadingMessages" class="flex justify-center py-8">
                                    <div class="animate-spin text-primary w-5 h-5 border-2 border-current border-t-transparent rounded-full"></div>
                                </div>
                                
                                <template v-else>
                                    <div v-for="msg in tab.data.messages" :key="msg.id" 
                                         class="flex gap-2 md:gap-3 group"
                                         :class="msg.role === 'user' ? 'flex-row-reverse' : 'flex-row'">
                                        
                                        <!-- Avatar -->
                                        <div class="w-8 h-8 rounded shrink-0 bg-gray-200 dark:bg-dark-hover overflow-hidden mt-1 shadow-sm">
                                            <img :src="msg.role === 'user' ? 'https://api.dicebear.com/7.x/avataaars/svg?seed=User' : getAvatar(tab.data.currentSession)" class="w-full h-full object-cover">
                                        </div>

                                        <!-- Message Bubble -->
                                        <div class="max-w-[85%] md:max-w-[80%]">
                                            <div class="flex items-center gap-2 mb-1" :class="msg.role === 'user' ? 'justify-end' : 'justify-start'">
                                                <span class="text-[10px] font-bold text-gray-500 dark:text-dark-muted">{{ msg.role === 'user' ? '你' : tab.data.currentSession.title }}</span>
                                                <span class="text-[10px] text-gray-400 opacity-0 group-hover:opacity-100 transition-opacity hidden md:block">{{ formatTime(msg.created_at) }}</span>
                                            </div>
                                            
                                            <div class="p-3 rounded-lg shadow-sm text-sm leading-relaxed overflow-hidden relative"
                                                 :class="msg.role === 'user' 
                                                    ? 'bg-primary text-white rounded-tr-sm' 
                                                    : 'bg-white dark:bg-dark-card border border-gray-200 dark:border-dark-border text-gray-800 dark:text-dark-text rounded-tl-sm'">
                                                
                                                <div class="markdown-body" v-html="renderMarkdown(msg.content)"></div>
                                                
                                                <!-- Metadata/Tools Indicator -->
                                                <div v-if="msg.metadata" class="mt-2 pt-2 border-t border-gray-200/20 text-[10px] opacity-70">
                                                    <div class="flex items-center gap-1 cursor-help">
                                                        <i class="fa-solid fa-code"></i> 工具调用日志
                                                    </div>
                                                </div>
                                            </div>
                                            <!-- Mobile Timestamp -->
                                            <div class="text-[10px] text-gray-400 mt-1 md:hidden" :class="msg.role === 'user' ? 'text-right' : 'text-left'">
                                                {{ formatTime(msg.created_at) }}
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div v-if="tab.data.messages && tab.data.messages.length === 0" class="flex flex-col items-center justify-center h-full text-gray-400">
                                        <p class="text-xs">暂无消息</p>
                                    </div>
                                </template>
                            </div>

                            <!-- Input Area -->
                            <div class="bg-white dark:bg-dark-card border-t border-gray-200 dark:border-dark-border shrink-0 pb-safe">
                                <div class="p-3">
                                    <div class="flex gap-3 items-end bg-gray-50 dark:bg-dark-bg rounded-2xl p-2 border border-gray-200 dark:border-dark-border focus-within:border-primary/50 focus-within:ring-1 focus-within:ring-primary/20 transition-all shadow-inner">
                                        <textarea placeholder="输入消息..." class="flex-1 bg-transparent border-none resize-none focus:ring-0 text-base max-h-32 py-2 px-2 text-gray-800 dark:text-gray-200" rows="1" style="min-height: 40px;"></textarea>
                                        <button class="w-10 h-10 rounded-xl bg-primary text-white shadow-md hover:bg-secondary transition-colors flex items-center justify-center mb-0.5 active:scale-95 shrink-0">
                                            <i class="fa-solid fa-paper-plane text-sm"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </template>

                        <!-- Empty State for Right Panel (Desktop Only) -->
                        <div v-else class="hidden md:flex flex-1 flex-col items-center justify-center text-gray-400 bg-gray-50 dark:bg-dark-bg">
                            <div class="w-16 h-16 bg-gray-200 dark:bg-dark-hover rounded-full flex items-center justify-center mb-4">
                                <i class="fa-solid fa-comments text-2xl text-gray-400 dark:text-gray-500"></i>
                            </div>
                            <p class="text-sm text-gray-500 dark:text-dark-muted">请从左侧选择一个成员开始对话</p>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script>
        const { createApp, ref, computed, onMounted, onUnmounted, nextTick } = Vue;

        createApp({
            setup() {
                const isDark = ref(true);
                const isMobile = ref(false);
                const loading = ref(true);
                const sessions = ref([]);
                
                // Tabs System
                const tabs = ref([
                    { id: 'dashboard', title: '仪表盘', type: 'dashboard', data: {} }
                ]);
                const activeTabId = ref('dashboard');

                // Responsive Check
                const checkMobile = () => {
                    isMobile.value = window.innerWidth < 768;
                };

                const isMobileChat = computed(() => {
                    if (!isMobile.value) return false;
                    const activeTab = tabs.value.find(t => t.id === activeTabId.value);
                    return activeTab && activeTab.type === 'team' && activeTab.data.currentSession;
                });

                // Theme Init
                if (localStorage.theme === 'light') {
                    isDark.value = false;
                    document.documentElement.classList.remove('dark');
                } else {
                    document.documentElement.classList.add('dark');
                }

                const toggleTheme = () => {
                    isDark.value = !isDark.value;
                    if (isDark.value) {
                        document.documentElement.classList.add('dark');
                        localStorage.theme = 'dark';
                    } else {
                        document.documentElement.classList.remove('dark');
                        localStorage.theme = 'light';
                    }
                };

                const groupedTeams = computed(() => {
                    const groups = {};
                    sessions.value.forEach(s => {
                        const name = s.group_name || '未分组';
                        if (!groups[name]) groups[name] = [];
                        groups[name].push(s);
                    });
                    return groups;
                });

                const fetchSessions = async () => {
                    try {
                        const res = await fetch('http://localhost:9527/api/v1/sessions');
                        if (!res.ok) throw new Error('Failed to fetch');
                        const data = await res.json();
                        sessions.value = data.sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));
                    } catch (e) {
                        console.error("API Error", e);
                    } finally {
                        loading.value = false;
                    }
                };

                // Tab Management
                const openTeamTab = (teamName) => {
                    const tabId = `team-${teamName}`;
                    const existingTab = tabs.value.find(t => t.id === tabId);
                    
                    if (existingTab) {
                        activeTabId.value = tabId;
                    } else {
                        tabs.value.push({
                            id: tabId,
                            title: teamName,
                            type: 'team',
                            data: {
                                teamName: teamName,
                                currentSession: null,
                                messages: [],
                                loadingMessages: false
                            }
                        });
                        activeTabId.value = tabId;
                    }
                };

                const closeTab = (tabId) => {
                    const idx = tabs.value.findIndex(t => t.id === tabId);
                    if (idx !== -1) {
                        tabs.value.splice(idx, 1);
                        // If closed active tab, switch to the one before it
                        if (activeTabId.value === tabId) {
                            activeTabId.value = tabs.value[Math.max(0, idx - 1)].id;
                        }
                    }
                };

                const getTabIcon = (type) => {
                    switch(type) {
                        case 'dashboard': return 'fa-solid fa-grid-2';
                        case 'team': return 'fa-solid fa-users';
                        default: return 'fa-solid fa-circle';
                    }
                };

                const selectSessionInTab = async (tab, session) => {
                    tab.data.currentSession = session;
                    tab.data.loadingMessages = true;
                    tab.data.messages = [];
                    
                    try {
                        const res = await fetch(`http://localhost:9527/api/v1/sessions/${session.id}/messages?limit=50`);
                        const data = await res.json();
                        if (data.messages) {
                            tab.data.messages = data.messages.reverse();
                        }
                    } catch (e) {
                        console.error(e);
                    } finally {
                        tab.data.loadingMessages = false;
                        nextTick(() => {
                            const container = document.getElementById(`messages-container-${tab.id}`);
                            if (container) container.scrollTop = container.scrollHeight;
                        });
                    }
                };

                const getAvatar = (session) => {
                    const seed = session.title || session.id;
                    return `https://api.dicebear.com/7.x/bottts/svg?seed=${seed}&backgroundColor=transparent`;
                };

                const formatTime = (isoString) => {
                    const date = new Date(isoString);
                    const now = new Date();
                    if (date.toDateString() === now.toDateString()) {
                        return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    }
                    return date.toLocaleDateString([], { month: 'short', day: 'numeric' });
                };

                const renderMarkdown = (text) => {
                    if (!text) return '';
                    return marked.parse(text);
                };

                onMounted(() => {
                    checkMobile();
                    window.addEventListener('resize', checkMobile);
                    fetchSessions();
                });

                onUnmounted(() => {
                    window.removeEventListener('resize', checkMobile);
                });

                return {
                    isDark,
                    isMobile,
                    isMobileChat,
                    toggleTheme,
                    loading,
                    tabs,
                    activeTabId,
                    groupedTeams,
                    openTeamTab,
                    closeTab,
                    getTabIcon,
                    selectSessionInTab,
                    getAvatar,
                    formatTime,
                    renderMarkdown
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
